name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: '3.13'

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: erp_test
          POSTGRES_USER: erp
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements/*.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/base.txt
          pip install coverage

      - name: Create local directory and env
        run: |
          mkdir -p local
          echo "SECRET_KEY=ci-test-secret-key-not-for-production" > local/.env
          echo "DEBUG=True" >> local/.env
          echo "DATABASE_URL=postgres://erp:testpass@localhost:5432/erp_test" >> local/.env
          echo "REDIS_URL=redis://localhost:6379/0" >> local/.env
          echo "FIELD_ENCRYPTION_KEY=$(python -c 'from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())')" >> local/.env

      - name: Run migrations
        env:
          DJANGO_SETTINGS_MODULE: config.settings.development
        run: python manage.py migrate --no-input

      - name: Run unit tests with coverage
        env:
          DJANGO_SETTINGS_MODULE: config.settings.development
        run: |
          coverage run --source=apps manage.py test apps/ -v 2 --parallel
          coverage report --fail-under=50
          coverage xml -o coverage.xml

      - name: Run verification tests
        env:
          DJANGO_SETTINGS_MODULE: config.settings.development
        run: python manage.py test tests.verification -v 2

      - name: Check for missing migrations
        env:
          DJANGO_SETTINGS_MODULE: config.settings.development
        run: python manage.py makemigrations --check --dry-run

      - name: Django deployment checks
        env:
          DJANGO_SETTINGS_MODULE: config.settings.production
          DATABASE_URL: postgres://erp:testpass@localhost:5432/erp_test
          SECRET_KEY: ci-test-secret-key-not-for-production
          ALLOWED_HOSTS: localhost
        run: python manage.py check --deploy --fail-level WARNING 2>&1 || true

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install linters
        run: pip install ruff

      - name: Run ruff check
        run: ruff check apps/ config/ --select E,F,W --ignore E501,F401,E402

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/base.txt
          pip install safety pip-audit

      - name: Check dependencies for vulnerabilities
        run: pip-audit --strict --desc 2>&1 || true
        continue-on-error: true

      - name: Check for secrets in code
        run: |
          # Check for common secret patterns
          if grep -rn "SECRET_KEY\s*=\s*['\"][^'\"]*['\"]" apps/ config/ --include="*.py" | grep -v "settings" | grep -v ".env" | grep -v "test" | grep -v "ci-test"; then
            echo "WARNING: Potential hardcoded secrets found"
          fi

  docker:
    runs-on: ubuntu-latest
    needs: [test, lint, security]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t erp-suite:${{ github.sha }} .

      - name: Verify image
        run: docker images erp-suite:${{ github.sha }}

      - name: Test container starts
        run: |
          docker run -d --name erp-test \
            -e SECRET_KEY=ci-test-secret-key-not-for-production \
            -e DEBUG=False \
            -e ALLOWED_HOSTS=localhost \
            erp-suite:${{ github.sha }}
          sleep 5
          docker logs erp-test
          docker stop erp-test
          docker rm erp-test
