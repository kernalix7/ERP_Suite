name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: '3.12'

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: erp_test
          POSTGRES_USER: erp
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements/*.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/base.txt
          pip install django-axes

      - name: Create local directory and env
        run: |
          mkdir -p local
          cat > local/.env << 'EOF'
          SECRET_KEY=ci-test-secret-key-not-for-production
          DEBUG=True
          DATABASE_URL=postgres://erp:testpass@localhost:5432/erp_test
          REDIS_URL=redis://localhost:6379/0
          EOF

      - name: Run migrations
        env:
          DJANGO_SETTINGS_MODULE: config.settings.development
        run: python manage.py migrate --no-input

      - name: Run tests
        env:
          DJANGO_SETTINGS_MODULE: config.settings.development
        run: python manage.py test apps/ -v 2 --parallel

      - name: Check for missing migrations
        env:
          DJANGO_SETTINGS_MODULE: config.settings.development
        run: python manage.py makemigrations --check --dry-run

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install linters
        run: pip install ruff

      - name: Run ruff check
        run: ruff check apps/ config/ --select E,F,W --ignore E501,F401,E402

  docker:
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t erp-suite:${{ github.sha }} .

      - name: Verify image
        run: docker images erp-suite:${{ github.sha }}
