{% extends "base.html" %}

{% block title %}예산 등록 - ERP Suite{% endblock %}
{% block page_title %}예산 등록{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto">
    <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-6">
        <form method="post">
            {% csrf_token %}
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">계정과목</label>
                    <select name="account" required class="form-input w-full rounded-lg border-gray-300">
                        <option value="">-- 선택 --</option>
                        {% for acct in accounts %}
                        <option value="{{ acct.pk }}">[{{ acct.code }}] {{ acct.name }} ({{ acct.get_account_type_display }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">연도</label>
                        <input type="number" name="year" value="{{ year }}" min="2020" max="2030" required
                               class="form-input w-full rounded-lg border-gray-300">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">월</label>
                        <input type="number" name="month" value="{{ month }}" min="1" max="12" required
                               class="form-input w-full rounded-lg border-gray-300">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">예산액</label>
                    <input type="number" name="budget_amount" min="0" required
                           class="form-input w-full rounded-lg border-gray-300"
                           placeholder="금액 입력">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">비고</label>
                    <input type="text" name="description" maxlength="200"
                           class="form-input w-full rounded-lg border-gray-300">
                </div>
            </div>
            <div class="mt-6 flex gap-3">
                <button type="submit" class="btn btn-primary">등록</button>
                <a href="{% url 'accounting:budget_list' %}" class="btn btn-secondary">취소</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
