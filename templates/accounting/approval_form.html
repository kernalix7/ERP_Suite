{% extends "base.html" %}
{% block title %}품의서 작성 - ERP Suite{% endblock %}
{% block page_title %}품의서 작성{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto bg-white rounded-xl shadow-sm border border-gray-200 p-6">
    <form method="post">
        {% csrf_token %}
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            {% for field in form %}
            <div class="{% if field.name == 'content' or field.name == 'notes' %}md:col-span-2{% endif %}">
                <label class="block text-sm font-medium text-gray-700 mb-1">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}<p class="mt-1 text-sm text-red-600">{{ field.errors.0 }}</p>{% endif %}
            </div>
            {% endfor %}
        </div>
        <div class="mt-6 flex justify-end gap-3">
            <a href="{% url 'accounting:approval_list' %}" class="btn btn-secondary">취소</a>
            <button type="submit" class="btn btn-primary">저장</button>
        </div>
    </form>
</div>
{% endblock %}
