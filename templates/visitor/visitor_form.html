{% extends "base.html" %}
{% load i18n %}

{% block title %}방문자 등록{% endblock %}
{% block page_title %}방문자 등록{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto bg-white rounded-lg shadow-sm border border-gray-200 p-6">
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {% for field in form %}
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}<p class="mt-1 text-sm text-red-600">{{ field.errors.0 }}</p>{% endif %}
        </div>
        {% endfor %}
        <div class="flex gap-3 mt-6">
            <button type="submit" class="btn btn-primary">저장</button>
            <a href="{% url 'visitor:visitor_list' %}" class="btn btn-secondary">취소</a>
        </div>
    </form>
</div>
{% endblock %}
