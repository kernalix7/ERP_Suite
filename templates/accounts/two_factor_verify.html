{% extends "base.html" %}

{% block title %}2단계 인증 - ERP Suite{% endblock %}

{% block public_content %}
<div class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4">
    <div class="w-full max-w-md">
        <div class="bg-white shadow-sm rounded-lg p-8">
            <div class="text-center mb-6">
                <div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-blue-100 mb-4">
                    <svg class="w-6 h-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                    </svg>
                </div>
                <h2 class="text-xl font-bold text-gray-900">2단계 인증</h2>
                <p class="text-sm text-gray-500 mt-1">인증 앱의 6자리 코드를 입력하세요</p>
            </div>
            <form method="post" class="space-y-4">
                {% csrf_token %}
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">{{ form.code.label }}</label>
                    {{ form.code }}
                    {% if form.code.errors %}
                    <p class="text-xs text-red-600 mt-1">{{ form.code.errors.0 }}</p>
                    {% endif %}
                    <p class="text-xs text-gray-400 mt-2">백업코드도 사용 가능합니다.</p>
                </div>
                <button type="submit" class="btn btn-primary w-full py-2.5">인증</button>
            </form>
            <div class="mt-4 text-center">
                <a href="{% url 'accounts:logout' %}" class="text-sm text-gray-500 hover:text-gray-700">로그아웃</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
