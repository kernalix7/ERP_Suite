{% extends "base.html" %}

{% block title %}재고실사 생성 - ERP Suite{% endblock %}
{% block page_title %}새 재고실사{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto">
    <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-4 sm:p-6">
        <form method="post">
            {% csrf_token %}
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1" for="id_warehouse">창고<span class="text-red-500 ml-0.5">*</span></label>
                    <select id="id_warehouse" name="warehouse" required class="form-input w-full rounded-lg border-gray-300">
                        <option value="">-- 선택 --</option>
                        {% for wh in warehouses %}
                        <option value="{{ wh.pk }}">{{ wh.name }} ({{ wh.code }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1" for="id_count_date">실사일<span class="text-red-500 ml-0.5">*</span></label>
                    <input type="date" id="id_count_date" name="count_date" value="{{ today }}" required
                           class="form-input w-full rounded-lg border-gray-300">
                </div>
            </div>
            <div class="mt-6 flex gap-3">
                <button type="submit" class="btn btn-primary">생성</button>
                <a href="{% url 'inventory:stockcount_list' %}" class="btn btn-secondary">취소</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
