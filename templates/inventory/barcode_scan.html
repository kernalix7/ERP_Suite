{% extends "base.html" %}

{% block title %}바코드/QR 스캔{% endblock %}
{% block page_title %}바코드/QR 스캔{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto" x-data="scannerApp()">
    <!-- 카메라 스캐너 -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 mb-6">
        <h2 class="text-lg font-semibold text-gray-900 mb-4 flex items-center gap-2">
            <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/>
            </svg>
            카메라 스캔
        </h2>

        <div id="reader" class="w-full rounded-lg overflow-hidden mb-4" style="min-height: 300px;"></div>

        <div class="flex gap-2">
            <button @click="startScanner()"
                    x-show="!scanning"
                    class="btn btn-primary flex-1 flex items-center justify-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/>
                </svg>
                스캐너 시작
            </button>
            <button @click="stopScanner()"
                    x-show="scanning"
                    class="btn btn-danger flex-1 flex items-center justify-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 10a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1v-4z"/>
                </svg>
                스캐너 중지
            </button>
        </div>

        <!-- 스캔 상태 메시지 -->
        <div x-show="statusMessage" x-cloak
             class="mt-3 px-4 py-2 rounded-lg text-sm"
             :class="statusType === 'success' ? 'bg-green-50 text-green-800 border border-green-200' :
                     statusType === 'error' ? 'bg-red-50 text-red-800 border border-red-200' :
                     'bg-blue-50 text-blue-800 border border-blue-200'">
            <span x-text="statusMessage"></span>
        </div>
    </div>

    <!-- 수동 입력 -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
        <h2 class="text-lg font-semibold text-gray-900 mb-4 flex items-center gap-2">
            <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
            </svg>
            수동 코드 입력
        </h2>

        <form method="post" action="{% url 'inventory:barcode_scan' %}" id="scanForm">
            {% csrf_token %}
            <div class="flex gap-2">
                <input type="text" name="code" id="codeInput"
                       placeholder="제품코드 또는 시리얼번호 입력"
                       class="form-input flex-1"
                       autocomplete="off"
                       required>
                <button type="submit" class="btn btn-primary">
                    조회
                </button>
            </div>
        </form>
    </div>

    <!-- 빠른 링크 -->
    <div class="mt-6 flex justify-center gap-4 text-sm">
        <a href="{% url 'inventory:product_list' %}" class="text-blue-600 hover:text-blue-800">제품 목록</a>
        <span class="text-gray-300">|</span>
        <a href="{% url 'warranty:warranty_verify' %}" class="text-blue-600 hover:text-blue-800">보증 확인</a>
    </div>
</div>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script>
function scannerApp() {
    return {
        scanning: false,
        scanner: null,
        statusMessage: '',
        statusType: 'info',

        startScanner() {
            this.statusMessage = '카메라를 준비하고 있습니다...';
            this.statusType = 'info';

            this.scanner = new Html5Qrcode("reader");
            this.scanner.start(
                { facingMode: "environment" },
                {
                    fps: 10,
                    qrbox: { width: 250, height: 250 },
                    aspectRatio: 1.0,
                },
                (decodedText) => {
                    this.onScanSuccess(decodedText);
                },
                (errorMessage) => {
                    // 스캔 실패는 무시 (계속 스캔 시도)
                }
            ).then(() => {
                this.scanning = true;
                this.statusMessage = '바코드 또는 QR코드를 카메라에 비춰주세요.';
                this.statusType = 'info';
            }).catch((err) => {
                this.statusMessage = '카메라를 사용할 수 없습니다. 수동 입력을 이용해주세요.';
                this.statusType = 'error';
                console.error('Scanner start error:', err);
            });
        },

        stopScanner() {
            if (this.scanner && this.scanning) {
                this.scanner.stop().then(() => {
                    this.scanning = false;
                    this.statusMessage = '스캐너가 중지되었습니다.';
                    this.statusType = 'info';
                }).catch(console.error);
            }
        },

        onScanSuccess(decodedText) {
            this.statusMessage = '코드 감지: ' + decodedText;
            this.statusType = 'success';

            // 스캐너 중지 후 폼 전송
            if (this.scanner && this.scanning) {
                this.scanner.stop().then(() => {
                    this.scanning = false;
                    this.submitCode(decodedText);
                }).catch(() => {
                    this.submitCode(decodedText);
                });
            } else {
                this.submitCode(decodedText);
            }
        },

        submitCode(code) {
            const form = document.getElementById('scanForm');
            const input = document.getElementById('codeInput');
            input.value = code;
            form.submit();
        }
    };
}
</script>
{% endblock %}
