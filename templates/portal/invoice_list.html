{% extends "portal/base_portal.html" %}

{% block title %}세금계산서 - ERP 포털{% endblock %}

{% block content %}
<h1 class="text-2xl font-bold text-gray-900 mb-6">세금계산서</h1>
<div class="bg-white shadow rounded-lg border border-gray-200">
    <div class="overflow-x-auto">
        <table class="w-full text-sm">
            <thead>
                <tr class="bg-gray-50 text-left text-xs text-gray-500 uppercase font-medium">
                    <th class="px-4 py-3">제목</th>
                    <th class="px-4 py-3">등록일</th>
                    <th class="px-4 py-3 text-center">다운로드</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-gray-100">
                {% for doc in documents %}
                <tr class="hover:bg-gray-50">
                    <td class="px-4 py-3 text-gray-900">{{ doc.title }}</td>
                    <td class="px-4 py-3 text-gray-600">{{ doc.created_at|date:"Y-m-d" }}</td>
                    <td class="px-4 py-3 text-center">
                        {% if doc.file %}<a href="{{ doc.file.url }}" class="text-blue-600 hover:underline text-sm">다운로드</a>{% else %}-{% endif %}
                    </td>
                </tr>
                {% empty %}
                <tr><td colspan="3" class="px-4 py-12 text-center text-gray-400">세금계산서가 없습니다.</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
