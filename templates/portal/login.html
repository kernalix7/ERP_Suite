<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>포털 로그인 - ERP Suite</title>
    <link rel="stylesheet" href="/static/css/tailwind.min.css">
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="bg-white shadow rounded-lg border border-gray-200 p-8 w-full max-w-md">
        <h1 class="text-2xl font-bold text-center text-gray-900 mb-6">ERP 포털 로그인</h1>
        {% if form.non_field_errors %}
        <div class="mb-4 p-3 bg-red-50 border border-red-200 rounded text-sm text-red-600">
            {% for error in form.non_field_errors %}{{ error }}{% endfor %}
        </div>
        {% endif %}
        <form method="post" class="space-y-4">
            {% csrf_token %}
            {% for field in form %}
            <div>
                <label for="{{ field.id_for_label }}" class="block text-sm font-medium text-gray-700 mb-1">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}<p class="mt-1 text-sm text-red-600">{{ field.errors.0 }}</p>{% endif %}
            </div>
            {% endfor %}
            <button type="submit" class="w-full btn btn-primary py-2">로그인</button>
        </form>
    </div>
</body>
</html>
