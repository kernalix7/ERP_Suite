{% extends "base.html" %}
{% load i18n %}

{% block title %}문서 작성 - 위키{% endblock %}
{% block page_title %}문서 작성{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto bg-white rounded-lg shadow-sm border border-gray-200 p-6">
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}<p class="mt-1 text-sm text-red-600">{{ field.errors.0 }}</p>{% endif %}
        </div>
        {% endfor %}
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">변경 요약 (수정 시)</label>
            <input type="text" name="change_summary" class="form-input w-full" placeholder="변경 내용을 간략히 설명하세요">
        </div>
        <div class="flex gap-3 mt-6">
            <button type="submit" class="btn btn-primary">저장</button>
            <a href="{% url 'wiki:article_list' %}" class="btn btn-secondary">취소</a>
        </div>
    </form>
</div>
{% endblock %}
