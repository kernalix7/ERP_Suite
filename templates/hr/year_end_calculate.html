{% extends "base.html" %}
{% load i18n %}

{% block title %}{% trans "연말정산 계산" %} - ERP Suite{% endblock %}
{% block page_title %}{% trans "연말정산 계산" %}{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto">
    <div class="bg-white shadow rounded-lg p-6">
        <div class="mb-6">
            <h2 class="text-lg font-semibold text-gray-800">{{ employee }}</h2>
            <p class="text-sm text-gray-500 mt-1">{{ employee.department|default:"-" }}</p>
        </div>
        <form method="post" action="{% url 'hr:year_end_calculate' employee.pk %}">
            {% csrf_token %}
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">{% trans "정산연도" %}</label>
                <select name="year" class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm">
                    {% for y in year_choices %}
                    <option value="{{ y }}">{{ y }}년</option>
                    {% endfor %}
                </select>
            </div>
            <button type="submit" class="w-full btn btn-primary">{% trans "연말정산 계산 실행" %}</button>
        </form>
        <div class="mt-4 text-center">
            <a href="{% url 'hr:year_end_list' %}" class="text-sm text-gray-500 hover:underline">{% trans "목록으로" %}</a>
        </div>
    </div>
</div>
{% endblock %}
