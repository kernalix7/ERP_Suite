server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: django-app
    static_configs:
      - targets:
          - localhost
        labels:
          job: django
          app: erp-suite
          __path__: /var/log/erp/*.log

  - job_name: django-security
    static_configs:
      - targets:
          - localhost
        labels:
          job: security
          app: erp-suite
          __path__: /var/log/erp/security.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            logger: logger
            timestamp: timestamp
      - labels:
          level:
          logger:

  - job_name: nginx
    static_configs:
      - targets:
          - localhost
        labels:
          job: nginx
          app: erp-suite
          __path__: /var/log/nginx/*.log
