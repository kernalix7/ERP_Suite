worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ──────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # ── Performance ──────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # ── Gzip ─────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml;

    # ── Rate Limiting ────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

    # ── Request Size Limit ───────────────────────────────────
    client_max_body_size 20M;
    client_body_buffer_size 128k;

    # ── Upstream ─────────────────────────────────────────────
    upstream django {
        server web:8000;
    }

    server {
        listen 80;
        server_name _;

        # ── WAF: Block SQL injection patterns ────────────────
        set $block_sql_injections 0;
        if ($query_string ~* "union.*select") { set $block_sql_injections 1; }
        if ($query_string ~* "insert.*into") { set $block_sql_injections 1; }
        if ($query_string ~* "drop\s+table") { set $block_sql_injections 1; }
        if ($query_string ~* "select.*from.*information_schema") { set $block_sql_injections 1; }
        if ($query_string ~* "(;|'|--|/\*|\*/|@@|char\(|exec\()") { set $block_sql_injections 1; }
        if ($block_sql_injections = 1) { return 403; }

        # ── WAF: Block path traversal ────────────────────────
        if ($uri ~* "\.\.") { return 403; }

        # ── WAF: Block common exploit scanners ───────────────
        if ($http_user_agent ~* "(nikto|sqlmap|nmap|masscan|zgrab)") { return 403; }

        # ── WAF: Block suspicious file extensions ────────────
        location ~* \.(php|asp|aspx|jsp|cgi|env|git|svn)$ {
            return 403;
        }

        # ── Static files (served directly by nginx) ──────────
        location /static/ {
            alias /app/staticfiles/;
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        location /media/ {
            alias /app/media/;
            expires 7d;
            add_header Cache-Control "public";
        }

        # ── Login endpoint (strict rate limit) ───────────────
        location /accounts/login/ {
            limit_req zone=login burst=3 nodelay;
            limit_req_status 429;

            proxy_pass http://django;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── API endpoints (moderate rate limit) ──────────────
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            limit_req_status 429;

            proxy_pass http://django;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── WebSocket ────────────────────────────────────────
        location /ws/ {
            proxy_pass http://django;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
        }

        # ── Default (general rate limit) ─────────────────────
        location / {
            limit_req zone=general burst=20 nodelay;
            limit_req_status 429;

            proxy_pass http://django;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;

            # Timeouts
            proxy_connect_timeout 30s;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        # ── Security headers (only those NOT set by Django) ──
        # Django handles: X-Frame-Options, X-Content-Type-Options, HSTS, CSP
        add_header X-Request-ID $request_id always;
    }
}
